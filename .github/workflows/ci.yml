name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests (with race detector)
        run: go test -race -timeout 120s ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web/ui

      - name: Run tests
        run: npx vitest run
        working-directory: web/ui

      - name: Build (typecheck + bundle)
        run: npm run build
        working-directory: web/ui

      # The built bundle is committed (web/static is embedded via go:embed
      # so `go build` works without npm). Fail if a UI change shipped
      # without regenerating it.
      - name: Verify committed web/static is fresh
        run: git diff --exit-code -- web/static

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        # haul's package graph (anacrolix/torrent + dht + DHT transitive deps)
        # is large enough that the default 1m context-load timeout sometimes
        # trips with "JSON decoding failed: unexpected EOF". Bump to 5m.
        run: golangci-lint run --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CGO_ENABLED=0 go build \
            -ldflags "-X github.com/beacon-stack/haul/internal/version.Version=${VERSION} \
                      -X github.com/beacon-stack/haul/internal/version.BuildTime=${BUILD_TIME} \
                      -s -w" \
            -o bin/haul ./cmd/haul

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: haul-linux-amd64
          path: bin/haul
          retention-days: 7

  docker:
    name: Docker
    runs-on: ubuntu-latest
    # Only build and push images on pushes to main (not PRs).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build, frontend]
    permissions:
      contents: read
      packages: write  # required to push to ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # Auto-provided GITHUB_TOKEN; the `packages: write` permission on
          # this job grants the right scopes. Works because the ghcr package
          # already exists (the 403-on-new-package issue only affects the
          # first push).
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          provenance: false
