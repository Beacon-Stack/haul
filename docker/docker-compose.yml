# ============================================================================
# Haul — standalone deployment
#
# Runs Haul on its own. State lives in a single SQLite file inside the
# /config volume — there is no database server to run.
#
# For the full Beacon Stack (Haul + Pulse + Pilot + Prism + VPN), see
# https://github.com/beacon-stack/deploy
#
# Quick start:
#   1. Edit the /path/to/... lines below.
#   2. docker compose up -d
#   3. Visit http://localhost:8484. Find your API key in Settings → System.
# ============================================================================

services:

  haul:
    image: ghcr.io/beacon-stack/haul:latest
    container_name: haul
    restart: unless-stopped
    environment:
      # The image defaults to the Beacon Stack layout (Pulse at
      # http://pulse:9696). Blank it out for standalone use.
      HAUL_PULSE_URL: ""
    volumes:
      - /path/to/config:/config
      - /path/to/downloads:/downloads
    ports:
      - "8484:8484"
      - "6881:6881/tcp"
      - "6881:6881/udp"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8484/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
